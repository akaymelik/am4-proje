<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AM4 Rota ve Kar Analizi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a2e; color: white; display: flex; justify-content: center; padding: 20px; }
        .container { background-color: #16213e; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 400px; }
        h1 { text-align: center; color: #e94560; }
        select, input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .result-box { background-color: #0f3460; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .btn { background-color: #e94560; color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>AM4 Analiz Paneli</h1>
    
    <label>Uçak Seçin:</label>
    <select id="planeSelect">
        <option value="">-- Uçak Seçiniz --</option>
    </select>

    <label>Mesafe (km):</label>
    <input type="number" id="distance" placeholder="Örn: 5500">

    <button class="btn" onclick="hesapla()">Analiz Et</button>

    <div id="result" class="result-box">
        <h3>Sonuçlar:</h3>
        <p id="fuelRes"></p>
        <p id="profitRes"></p>
    </div>
</div>

<script src="planes.js"></script>
<script>
    // Uçak listesini doldur
    const select = document.getElementById('planeSelect');
    for (let plane in aircraftData) {
        let opt = document.createElement('option');
        opt.value = plane;
        opt.innerHTML = plane;
        select.appendChild(opt);
    }

    function hesapla() {
        const planeName = document.getElementById('planeSelect').value;
        const dist = document.getElementById('distance').value;
        const resBox = document.getElementById('result');

        if (!planeName || !dist) return alert("Lütfen bilgileri girin!");

        const plane = aircraftData[planeName];
        
        // Basit AM4 Hesaplama Mantığı (Excel'den alınan mantık)
        const fuelUsed = (dist * plane.fuel_consumption).toFixed(2);
        const estimatedRevenue = (plane.capacity * (dist * 0.4)).toFixed(2); // Örnek katsayı
        
        document.getElementById('fuelRes').innerHTML = "Harcanacak Yakıt: " + fuelUsed + " Litre";
        document.getElementById('profitRes').innerHTML = "Tahmini Brüt Gelir: $" + estimatedRevenue;
        resBox.style.display = "block";
    }
</script>

</body>
</html>
