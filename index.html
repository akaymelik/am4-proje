<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MENOA AI - AM4 Strateji Merkezi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-links">
            <a onclick="UI.showPage('home')" class="logo">MENOA AI</a>
            <div class="dropdown" id="paxDrop">
                <span onclick="UI.toggleDropdown('paxDrop')">Yolcu ▾</span>
                <div class="dropdown-content">
                    <a onclick="UI.showPage('pax-route')">Rota & Analiz</a>
                </div>
            </div>
            <div class="dropdown" id="cargoDrop">
                <span onclick="UI.toggleDropdown('cargoDrop')">Kargo ▾</span>
                <div class="dropdown-content">
                    <a onclick="UI.showPage('cargo-route')">Rota & Analiz</a>
                </div>
            </div>
        </div>
        <div class="mode-selector">
            <button id="btn-easy" class="mode-btn" onclick="UI.setGameMode('easy')">Easy</button>
            <button id="id-real" class="mode-btn active" onclick="UI.setGameMode('realism')">Realism</button>
        </div>
    </nav>

    <div class="container">
        <div id="home" class="page active">
            <h2>Hoş Geldin Meray</h2>
            <div id="modeDisplay" class="status-box status-danger">Aktif Mod: Realism</div>
            <p>AM4 Master verileriyle rota ve koltuk optimizasyonu yapabilirsin.</p>
        </div>

        <div id="pax-route" class="page">
            <h2>Yolcu Rota Analizi</h2>
            <div class="config-panel">
                <label>Uçak Seç:</label>
                <select id="paxRouteSelect"></select>
                <label>Günlük Sefer (Opsiyonel):</label>
                <input type="number" id="paxTripsInput" placeholder="Maksimum için boş bırak">
                <button onclick="UI.renderRouteAnalysis('pax')">Analiz Et</button>
            </div>
            <div id="paxRouteResult"></div>
        </div>

        <div id="cargo-route" class="page">
            <h2>Kargo Rota Analizi</h2>
            <div class="config-panel">
                <label>Uçak Seç:</label>
                <select id="cargoRouteSelect"></select>
                <label>Günlük Sefer (Opsiyonel):</label>
                <input type="number" id="cargoTripsInput" placeholder="Maksimum için boş bırak">
                <button onclick="UI.renderRouteAnalysis('cargo')">Analiz Et</button>
            </div>
            <div id="cargoRouteResult"></div>
        </div>
    </div>

    <!-- AI Chat Widget -->
    <div id="chat-window" class="chat-hidden">
        <div class="chat-header"><span>🤖 MENOA AI</span><button onclick="Chat.toggle()">✕</button></div>
        <div id="chat-body"></div>
        <div class="chat-footer">
            <input type="text" id="chatInput" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') Chat.send()">
            <button onclick="Chat.send()">➤</button>
        </div>
    </div>
    <button id="chat-toggle-btn" onclick="Chat.toggle()">🤖</button>

    <!-- KRİTİK SIRALAMA -->
    <script src="planes.js"></script>
    <script src="routes.js"></script>
    <script src="utils.js"></script>
    <script src="configurator.js"></script>
    <script src="logic.js"></script>
    <script src="ui.js"></script>
</body>
</html>
